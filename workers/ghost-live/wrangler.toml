name = "ghost-live"
main = "src/index.ts"
compatibility_date = "2024-12-02"
workers_dev = true
preview_urls = false

routes = [
  { pattern = "live.free-node.xyz/*", zone_name = "free-node.xyz" }
]

# Durable Objects 绑定
[durable_objects]
bindings = [
  { name = "PRESENCE_ROOM", class_name = "PresenceRoom" }
]

# 声明 Durable Object 类 (免费版需要用 new_sqlite_classes)
[[migrations]]
tag = "v1"
new_sqlite_classes = ["PresenceRoom"]

[env.production]
name = "ghost-live"

[env.preview]
name = "ghost-live-preview"
