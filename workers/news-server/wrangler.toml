name = "free-node-news"
main = "src/index.ts"
compatibility_date = "2024-11-01"

# 启用 workers.dev 子域名
workers_dev = true

# KV 命名空间配置
[[kv_namespaces]]
binding = "NEWS_CACHE"
id = "fe4901d1d41f4c8880ec776be03058fc"

# 自定义域名配置（已在 Dashboard 配置，无需重复）
# [[routes]]
# pattern = "news.free-node.xyz/*"
# zone_name = "free-node.xyz"

# 定时任务：每小时爬取交易所活动
[triggers]
crons = ["0 * * * *"]

# 环境变量
[vars]
GHOST_CORE_API = "https://core.free-node.xyz"

# Secrets (需要通过 wrangler secret put 设置)
# ADMIN_KEY = "xxx"
